app = "pitstop-api"
primary_region = "sin"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_HTTP_PORTS   = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source      = "pitstop_data"
  destination = "/data"
